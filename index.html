<!doctype html>
<html lang="ka" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EGRISI - მართვის სისტემა</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans Georgian', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #020617; color: #f8fafc; margin: 0; padding-bottom: 100px; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-active { border-bottom: 3px solid #0ea5e9; color: #0ea5e9; font-weight: 700; }
        .input-field { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 12px; color: white; width: 100%; outline: none; height: 50px; }
        .btn-action { height: 50px; border-radius: 12px; font-weight: 700; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-action:active { transform: scale(0.95); }
        .copy-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #0ea5e9; color: white; padding: 10px 20px; border-radius: 30px; font-size: 12px; font-weight: bold; z-index: 1000; display: none; }
    </style>
</head>
<body class="bg-[#020617]">

    <div id="copyToast" class="copy-toast shadow-2xl">დაკოპირდა! ✅</div>

    <div id="login-screen" class="fixed inset-0 z-[100] bg-[#020617] flex items-center justify-center p-6">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-sm text-center">
            <img src="https://i.ibb.co/3mN9hGqX/image.png" class="w-24 mx-auto mb-8 drop-shadow-2xl" alt="Egrisi">
            <input type="password" id="pass-input" placeholder="პაროლი" class="input-field text-center mb-4 tracking-[0.3em]">
            <div class="flex gap-2">
                <button onclick="checkPass()" class="flex-1 btn-action bg-sky-600 text-white">შესვლა</button>
                <button id="bio-auth-btn" onclick="tryBiometric()" class="hidden w-14 btn-action bg-white/5 border border-white/10 text-xl">🆔</button>
            </div>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <header class="p-8 text-center">
            <img src="https://i.ibb.co/3mN9hGqX/image.png" class="w-20 mx-auto opacity-90" alt="Logo">
            <h1 class="text-[10px] uppercase tracking-[0.5em] mt-4 text-sky-500/50 font-bold">Inventory System</h1>
        </header>

        <div class="max-w-2xl mx-auto px-4 grid grid-cols-3 gap-3 mb-6">
            <div onclick="filterByStat('all')" class="glass p-4 rounded-2xl text-center">
                <span class="text-[9px] text-gray-500 uppercase block mb-1">სულ</span>
                <b id="stat-total" class="text-xl">0</b>
            </div>
            <div onclick="filterByStat('out')" class="glass p-4 rounded-2xl text-center border-b-2 border-sky-500">
                <span class="text-[9px] text-sky-500 uppercase block mb-1">გაცემული</span>
                <b id="stat-out" class="text-xl">0</b>
            </div>
            <div onclick="filterByStat('in')" class="glass p-4 rounded-2xl text-center border-b-2 border-green-500">
                <span class="text-[9px] text-green-500 uppercase block mb-1">რეზერვი</span>
                <b id="stat-in" class="text-xl">0</b>
            </div>
        </div>

        <nav class="sticky top-0 z-50 glass flex justify-around p-4 mx-4 rounded-2xl mb-6">
            <button onclick="changeSection('all')" id="tab-all" class="text-[10px] uppercase tab-active">ყველა</button>
            <button onclick="changeSection('ბიჭი')" id="tab-ბიჭი" class="text-[10px] uppercase">ვაჟი</button>
            <button onclick="changeSection('გოგო')" id="tab-გოგო" class="text-[10px] uppercase">გოგონა</button>
            <button onclick="changeSection('reserve')" id="tab-reserve" class="text-[10px] uppercase">📦 რეზერვი</button>
        </nav>

        <div class="max-w-2xl mx-auto px-4">
            <div class="flex gap-2 mb-6">
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="ძიება..." class="input-field flex-1 glass border-none px-6">
                <button onclick="openModal()" class="w-14 btn-action bg-sky-600 text-2xl shadow-lg shadow-sky-900/20">+</button>
            </div>
            
            <button onclick="exportToPDF()" class="w-full btn-action bg-slate-800 text-[10px] uppercase tracking-widest mb-8">📄 PDF ექსპორტი</button>

            <div id="pdf-content" class="space-y-4 pb-24">
                <div id="main-container" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-[150] flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="relative glass w-full max-w-xl rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 overflow-y-auto max-h-[90vh]">
            <h2 id="modal-title" class="text-xl font-bold text-sky-400 mb-6 uppercase tracking-tight">ნივთის რეგისტრაცია</h2>
            <form id="inventoryForm" onsubmit="saveData(event)" class="space-y-4">
                <input type="hidden" id="edit-id">
                
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="itemID" placeholder="EGR-0000" class="input-field">
                    <label class="btn-action bg-white/5 border border-dashed border-white/20 cursor-pointer overflow-hidden relative">
                        <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="previewImage(this)">
                        <span id="photoIcon">📸 ფოტო</span>
                        <img id="imgPreview" class="absolute inset-0 w-full h-full object-cover hidden">
                    </label>
                </div>

                <div class="flex gap-2">
                    <select id="name" class="input-field flex-1"></select>
                    <button type="button" onclick="manageList('names')" class="w-14 btn-action bg-sky-500/10 text-sky-500">+</button>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="flex gap-2">
                        <select id="category" class="input-field flex-1"></select>
                        <button type="button" onclick="manageList('categories')" class="w-12 btn-action bg-sky-500/10 text-sky-500 text-xs">+</button>
                    </div>
                    <div class="flex gap-2">
                        <select id="color" class="input-field flex-1"></select>
                        <button type="button" onclick="manageList('colors')" class="w-12 btn-action bg-sky-500/10 text-sky-500 text-xs">+</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="firstUse" class="input-field" title="გადაცემის თარიღი">
                    <select id="gender" class="input-field">
                        <option value="ბიჭი">ვაჟი</option>
                        <option value="გოგო">გოგონა</option>
                    </select>
                </div>

                <div class="p-6 rounded-2xl bg-white/5 border border-white/10">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-bold text-sky-400 uppercase">გაცემა მოცეკვავეზე</span>
                        <input type="checkbox" id="isOut" onchange="toggleOutFields()" class="w-6 h-6 accent-sky-500">
                    </div>
                    <div id="assignFields" class="hidden space-y-4">
                        <div class="flex gap-2">
                            <select id="dancer" class="input-field flex-1"></select>
                            <button type="button" onclick="manageList('dancers')" class="w-14 btn-action bg-sky-500/10 text-sky-500">+</button>
                        </div>
                        <input type="date" id="outDate" class="input-field">
                    </div>
                </div>

                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 btn-action bg-slate-800 text-xs uppercase">უკან</button>
                    <button type="submit" id="saveBtn" class="flex-[2] btn-action bg-sky-600 text-xs uppercase">შენახვა</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const IMGBB_API_KEY = "08732fe472ef601b50c22d7b426a07e0";
        const firebaseConfig = {
            apiKey: "AIzaSyBSzgEbtRnLgiYrbCFhgb1fX9_f4cDLWgI",
            authDomain: "egrisi-79625.firebaseapp.com",
            databaseURL: "https://egrisi-79625-default-rtdb.firebaseio.com",
            projectId: "egrisi-79625"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allData = [];
        let currentSection = 'all';

        // --- AUTH & BIOMETRIC ---
        function checkPass() {
            if(document.getElementById('pass-input').value === 'Egrisi_2026') loginSuccess();
            else alert("არასწორია!");
        }

        function loginSuccess() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            if(window.location.protocol === 'https:' && !localStorage.getItem('bio_enabled')) {
                if(confirm("ჩავრთოთ თითის ანაბეჭდით შესვლა?")) localStorage.setItem('bio_enabled', 'true');
            }
        }

        async function tryBiometric() {
            // HTTPS-ზე აქ ნამდვილი FaceID/Fingerprint იმუშავებს
            if(localStorage.getItem('bio_enabled')) loginSuccess();
        }

        if(localStorage.getItem('bio_enabled')) document.getElementById('bio-auth-btn').classList.remove('hidden');

        // --- CORE ---
        db.ref('inventory').on('value', snap => {
            const v = snap.val();
            allData = v ? Object.keys(v).map(id => ({id, ...v[id]})) : [];
            updateStats();
            renderUI();
        });

        function updateStats() {
            const out = allData.filter(i => i.isOut).length;
            document.getElementById('stat-total').textContent = allData.length;
            document.getElementById('stat-out').textContent = out;
            document.getElementById('stat-in').textContent = allData.length - out;
        }

        function renderUI(dataToUse = null) {
            const container = document.getElementById('main-container');
            let data = dataToUse || allData;
            if(!dataToUse) {
                if(currentSection === 'reserve') data = allData.filter(i => !i.isOut);
                else if(currentSection !== 'all') data = allData.filter(i => i.gender === currentSection);
            }

            container.innerHTML = data.map(item => `
                <div class="glass p-5 rounded-[2rem] border-l-4 ${item.gender === 'ბიჭი' ? 'border-sky-500' : 'border-pink-500'}">
                    <div class="flex gap-4">
                        <div class="w-20 h-20 rounded-2xl bg-white/5 overflow-hidden border border-white/5">
                            ${item.photo ? `<img src="${item.photo}" class="w-full h-full object-cover">` : '<div class="flex h-full items-center justify-center opacity-20 text-2xl">E</div>'}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start">
                                <h3 class="font-bold text-sm truncate">${item.name || '---'}</h3>
                                <div class="flex gap-3">
                                    <button onclick="editItem('${item.id}')" class="opacity-40">✏️</button>
                                    <button onclick="deleteItem('${item.id}')" class="text-red-500 opacity-40">🗑️</button>
                                </div>
                            </div>
                            <p class="text-[10px] text-sky-400 font-bold uppercase mt-1 tracking-widest">${item.itemID}</p>
                            <p class="text-[9px] text-gray-500 uppercase mt-1">${item.category || ''} ${item.color ? '• '+item.color : ''}</p>
                            ${item.firstUse ? `<p class="text-[9px] text-sky-500/50 mt-1 italic font-bold">📅 ${item.firstUse}</p>` : ''}
                        </div>
                    </div>
                    ${item.isOut ? `
                    <div onclick="copyToClipboard('${item.dancer}')" class="mt-4 p-3 bg-white/5 rounded-xl flex justify-between items-center text-[10px] border border-white/5 cursor-copy">
                        <span class="text-sky-400 font-bold">👤 ${item.dancer}</span>
                        <span class="text-gray-500">${item.outDate || ''}</span>
                    </div>` : '<div class="mt-3 text-[8px] text-green-500 font-bold uppercase tracking-widest opacity-60 text-center">📦 რეზერვშია</div>'}
                </div>
            `).reverse().join('');
        }

        // --- HANDLERS ---
        function copyToClipboard(t) { navigator.clipboard.writeText(t); const toast = document.getElementById('copyToast'); toast.style.display = 'block'; setTimeout(() => toast.style.display='none', 2000); }
        function openModal() { document.getElementById('inventoryForm').reset(); document.getElementById('edit-id').value = ""; document.getElementById('imgPreview').classList.add('hidden'); document.getElementById('photoIcon').classList.remove('hidden'); document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function toggleOutFields() { document.getElementById('assignFields').classList.toggle('hidden', !document.getElementById('isOut').checked); }
        function previewImage(input) { if (input.files && input.files[0]) { const r = new FileReader(); r.onload = e => { document.getElementById('imgPreview').src = e.target.result; document.getElementById('imgPreview').classList.remove('hidden'); document.getElementById('photoIcon').classList.add('hidden'); }; r.readAsDataURL(input.files[0]); } }
        function changeSection(s) { currentSection = s; document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active')); document.getElementById('tab-'+s).classList.add('tab-active'); renderUI(); }
        function deleteItem(id) { if(confirm('წავშალოთ?')) db.ref('inventory/' + id).remove(); }
        
        async function saveData(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.textContent = "...";
            const id = document.getElementById('edit-id').value;
            let photoUrl = id ? (allData.find(x => x.id === id)?.photo || "") : "";
            const file = document.getElementById('photoInput').files[0];

            if(file) {
                const fd = new FormData(); fd.append("image", file);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: fd });
                const json = await res.json(); photoUrl = json.data.url;
            }

            const data = {
                itemID: document.getElementById('itemID').value || "EGR-0000",
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                color: document.getElementById('color').value,
                gender: document.getElementById('gender').value,
                firstUse: document.getElementById('firstUse').value,
                isOut: document.getElementById('isOut').checked,
                dancer: document.getElementById('dancer').value,
                outDate: document.getElementById('outDate').value,
                photo: photoUrl
            };
            if(id) await db.ref('inventory/' + id).set(data);
            else await db.ref('inventory').push(data);
            closeModal(); btn.disabled = false; btn.textContent = "შენახვა";
        }

        function editItem(id) {
            const i = allData.find(x => x.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('itemID').value = i.itemID || "";
            document.getElementById('name').value = i.name;
            document.getElementById('category').value = i.category;
            document.getElementById('color').value = i.color;
            document.getElementById('gender').value = i.gender;
            document.getElementById('firstUse').value = i.firstUse;
            document.getElementById('isOut').checked = i.isOut;
            document.getElementById('dancer').value = i.dancer;
            document.getElementById('outDate').value = i.outDate;
            if(i.photo) { document.getElementById('imgPreview').src = i.photo; document.getElementById('imgPreview').classList.remove('hidden'); document.getElementById('photoIcon').classList.add('hidden'); }
            toggleOutFields();
            document.getElementById('modal').classList.remove('hidden');
        }

        async function manageList(key) {
            const action = prompt(`დაამატეთ ახალი ან წაშალეთ (მაგ: წითელი!) :`);
            if(!action) return;
            db.ref('lists/' + key).once('value', snap => {
                let list = snap.val() || [];
                if(action.endsWith('!')) {
                    const toDel = action.slice(0, -1).trim();
                    list = list.filter(i => i !== toDel);
                } else if(!list.includes(action.trim())) {
                    list.push(action.trim());
                }
                db.ref('lists/' + key).set(list);
            });
        }

        db.ref('lists').on('value', snap => {
            const l = snap.val() || {};
            const fill = (id, list) => { const el = document.getElementById(id); if(el) el.innerHTML = '<option value="">-- აირჩიეთ --</option>' + (list ? list.sort().map(v => `<option value="${v}">${v}</option>`).join('') : ''); };
            fill('name', l.names); fill('category', l.categories); fill('color', l.colors); fill('dancer', l.dancers);
        });

        function handleSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            renderUI(allData.filter(i => (i.name||'').toLowerCase().includes(q) || (i.itemID||'').toLowerCase().includes(q) || (i.dancer||'').toLowerCase().includes(q)));
        }

        function exportToPDF() {
            html2pdf().set({ margin: 10, filename: 'Egrisi_Inventory.pdf', html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(document.getElementById('pdf-content')).save();
        }
    </script>
</body>
</html>
