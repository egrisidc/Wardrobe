<!doctype html>
<html lang="ka" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ეგრისი - მართვის სისტემა</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans Georgian', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #020617; color: #f8fafc; margin: 0; padding-bottom: 100px; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .pink-glow { text-shadow: 0 0 10px rgba(236, 72, 153, 0.5); color: #ec4899; }
        .tab-active { border-bottom: 4px solid #ec4899; color: #ec4899; font-weight: 700; }
        .input-field { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 12px; color: white; width: 100%; outline: none; }
        .overdue { border: 2px solid #ef4444 !important; background: rgba(239, 68, 68, 0.1) !important; }
    </style>
</head>
<body>

    <div id="login-screen" class="fixed inset-0 z-[100] bg-[#020617] flex items-center justify-center p-6 text-center">
        <div class="glass p-10 rounded-[3rem] w-full max-w-sm">
            <h2 class="text-2xl font-black mb-8 pink-glow uppercase tracking-widest">ეგრისი</h2>
            <input type="password" id="pass-input" placeholder="პაროლი" class="input-field text-center mb-4 w-full">
            <button onclick="checkPass()" class="w-full p-4 bg-pink-600 rounded-xl font-bold shadow-lg shadow-pink-900/40">შესვლა</button>
        </div>
    </div>

    <div id="app-content" class="hidden">
        <nav class="sticky top-0 z-50 glass flex justify-around p-5 mb-4">
            <button onclick="changeSection('all')" id="tab-all" class="pb-1 text-sm tab-active font-bold">ყველა</button>
            <button onclick="changeSection('ბიჭი')" id="tab-ბიჭი" class="pb-1 text-sm">ბიჭი</button>
            <button onclick="changeSection('გოგო')" id="tab-გოგო" class="pb-1 text-sm">გოგონა</button>
        </nav>

        <div class="max-w-2xl mx-auto px-4">
            <input type="text" id="searchInput" oninput="handleSearch()" placeholder="ძებნა (სახელი, გვარი, ID...)" class="input-field w-full mb-6 py-4 px-6 glass border-pink-500/30">
            <div class="flex justify-between items-center mb-6">
                <div class="glass px-6 py-4 rounded-3xl flex-1 mr-4">
                    <span class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">ბაზაშია</span>
                    <div id="total-count" class="text-3xl font-black italic">0</div>
                </div>
                <button onclick="openModal()" class="w-16 h-16 bg-pink-600 rounded-2xl text-2xl font-bold shadow-lg shadow-pink-900/40">+</button>
            </div>
            <div id="main-container" class="space-y-4"></div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-[60] flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="absolute inset-0 bg-black/95 backdrop-blur-md" onclick="closeModal()"></div>
        <div class="relative glass w-full max-w-xl rounded-t-[2.5rem] sm:rounded-[2.5rem] p-6 overflow-y-auto max-h-[95vh] border border-white/10">
            <div class="flex justify-between items-start mb-6">
                <h2 id="modal-title" class="text-xl font-black pink-glow uppercase tracking-widest">რეგისტრაცია</h2>
                <div id="firstUseInfo" class="text-[11px] pink-glow font-bold uppercase italic"></div>
            </div>
            
            <form id="inventoryForm" onsubmit="saveData(event)" class="space-y-4">
                <input type="hidden" id="edit-id">
                
                <div class="flex gap-4 items-center">
                    <div class="flex-1">
                        <label class="text-[10px] text-gray-400 ml-2 uppercase font-bold">ნივთის ID</label>
                        <input type="text" id="itemID" placeholder="EGR-000" class="input-field mt-1 w-full">
                    </div>
                    <label class="relative w-24 h-24 bg-white/5 rounded-2xl border-2 border-dashed border-white/10 flex items-center justify-center cursor-pointer overflow-hidden">
                        <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="previewImage(this)">
                        <img id="imgPreview" class="absolute inset-0 w-full h-full object-cover hidden">
                        <span id="photoIcon" class="text-2xl">📸</span>
                    </label>
                </div>

                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] text-gray-400 ml-2 uppercase font-bold">დასახელება</label>
                        <div class="flex gap-2">
                            <select id="name" class="input-field flex-1"></select>
                            <button type="button" onclick="manageList('names')" class="bg-pink-600/10 text-pink-500 px-5 rounded-xl font-bold">+</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[10px] text-gray-400 ml-2 uppercase font-bold">ფერი</label>
                            <div class="flex gap-2">
                                <select id="color" class="input-field flex-1"></select>
                                <button type="button" onclick="manageList('colors')" class="bg-pink-600/10 text-pink-500 px-4 rounded-xl font-bold">+</button>
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] text-gray-400 ml-2 uppercase font-bold">კატეგორია</label>
                            <div class="flex gap-2">
                                <select id="category" class="input-field flex-1"></select>
                                <button type="button" onclick="manageList('categories')" class="bg-pink-600/10 text-pink-500 px-4 rounded-xl font-bold">+</button>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <select id="gender" class="input-field">
                            <option value="ბიჭი">ბიჭი</option>
                            <option value="გოგო">გოგო</option>
                        </select>
                        <input type="date" id="firstUse" class="input-field">
                    </div>
                </div>

                <div class="p-5 rounded-2xl bg-white/5 border border-white/10">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-sm font-bold text-pink-400 uppercase tracking-tighter">მოცეკვავეზე გაცემა</span>
                        <input type="checkbox" id="isOut" onchange="toggleOutFields()" class="w-7 h-7 accent-pink-600">
                    </div>
                    <div id="assignFields" class="hidden space-y-4">
                        <div class="flex gap-2">
                            <select id="dancer" class="input-field flex-1"></select>
                            <button type="button" onclick="manageList('dancers')" class="bg-pink-600/10 text-pink-500 px-4 rounded-xl font-bold">+</button>
                        </div>
                        <input type="date" id="outDate" class="input-field w-full">
                    </div>
                </div>

                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="closeModal()" class="flex-1 p-4 bg-slate-800 rounded-xl font-bold">უკან</button>
                    <button type="submit" id="saveBtn" class="flex-[2] p-4 bg-pink-600 rounded-xl font-black uppercase tracking-widest">შენახვა</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const IMGBB_API_KEY = "08732fe472ef601b50c22d7b426a07e0";
        const firebaseConfig = {
            apiKey: "AIzaSyBSzgEbtRnLgiYrbCFhgb1fX9_f4cDLWgI",
            authDomain: "egrisi-79625.firebaseapp.com",
            databaseURL: "https://egrisi-79625-default-rtdb.firebaseio.com",
            projectId: "egrisi-79625"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allData = [];
        let currentSection = 'all';
        let lists = { names: [], colors: [], categories: [], dancers: [] };

        function checkPass() {
            if(document.getElementById('pass-input').value === 'Egrisi2024') {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-content').classList.remove('hidden');
            }
        }

        // Firebase Listeners
        db.ref('inventory').on('value', snap => {
            const val = snap.val();
            allData = val ? Object.keys(val).map(id => ({id, ...val[id]})) : [];
            renderUI();
        });

        db.ref('lists').on('value', snap => {
            lists = snap.val() || { names: [], colors: [], categories: [], dancers: [] };
            populateSelects();
        });

        function populateSelects() {
            const fill = (id, list) => {
                const el = document.getElementById(id);
                el.innerHTML = '<option value="">-- აირჩიეთ --</option>' + (list ? list.sort().map(v => `<option value="${v}">${v}</option>`).join('') : '');
            };
            fill('name', lists.names); fill('color', lists.colors); fill('category', lists.categories); fill('dancer', lists.dancers);
        }

        async function manageList(key) {
            const action = prompt(`დაამატეთ ახალი ან წაშალეთ (მაგ: ჩოხა!) :`);
            if(!action) return;
            let updatedList = [...(lists[key] || [])];
            if(action.endsWith('!')) {
                const toDel = action.slice(0, -1).trim();
                updatedList = updatedList.filter(i => i !== toDel);
            } else if(!updatedList.includes(action.trim())) {
                updatedList.push(action.trim());
            }
            await db.ref('lists/' + key).set(updatedList);
        }

        async function saveData(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.textContent = "იტვირთება...";

            const id = document.getElementById('edit-id').value;
            const file = document.getElementById('photoInput').files[0];
            let photoUrl = id ? (allData.find(x => x.id === id)?.photo || "") : "";

            if(file) {
                const formData = new FormData();
                formData.append("image", file);
                try {
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                    const json = await res.json();
                    photoUrl = json.data.url;
                } catch(e) { console.error("Upload error"); }
            }

            const data = {
                itemID: document.getElementById('itemID').value || "EGR-" + Math.floor(1000 + Math.random() * 9000),
                name: document.getElementById('name').value,
                color: document.getElementById('color').value,
                category: document.getElementById('category').value,
                gender: document.getElementById('gender').value,
                firstUse: document.getElementById('firstUse').value,
                isOut: document.getElementById('isOut').checked,
                dancer: document.getElementById('dancer').value || "",
                outDate: document.getElementById('outDate').value || "",
                photo: photoUrl
            };

            if(id) await db.ref('inventory').child(id).set(data);
            else await db.ref('inventory').push(data);

            closeModal();
            btn.disabled = false; btn.textContent = "შენახვა";
        }

        function handleSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            if(!q) { renderUI(); return; }
            const filtered = allData.filter(i => 
                (i.name && i.name.toLowerCase().includes(q)) || 
                (i.itemID && i.itemID.toLowerCase().includes(q)) || 
                (i.dancer && i.dancer.toLowerCase().includes(q)) ||
                (i.category && i.category.toLowerCase().includes(q))
            );
            renderUI(filtered);
        }

        function renderUI(dataToUse = null) {
            const container = document.getElementById('main-container');
            const data = dataToUse || (currentSection === 'all' ? allData : allData.filter(i => i.gender === currentSection));
            document.getElementById('total-count').textContent = data.length;

            container.innerHTML = data.map(item => {
                const isOverdue = item.isOut && item.outDate && (new Date(item.outDate) < new Date().setHours(0,0,0,0));
                return `
                <div class="glass p-5 rounded-[2rem] border-l-4 ${item.gender === 'ბიჭი' ? 'border-blue-500' : 'border-pink-500'} ${isOverdue ? 'overdue' : ''}">
                    <div class="flex gap-4">
                        <div class="w-20 h-20 rounded-2xl bg-white/5 overflow-hidden flex-shrink-0 border border-white/5">
                            ${item.photo ? `<img src="${item.photo}" class="w-full h-full object-cover">` : '<div class="flex h-full items-center justify-center text-2xl opacity-20">🧥</div>'}
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start">
                                <h3 class="font-bold truncate pr-2 text-sm">${item.name}</h3>
                                <div class="flex gap-2">
                                    <button onclick="editItem('${item.id}')" class="p-2 glass rounded-lg text-[10px] hover:bg-pink-500/20">✏️</button>
                                    <button onclick="deleteItem('${item.id}')" class="p-2 glass rounded-lg text-[10px] text-red-500 hover:bg-red-500/20">🗑️</button>
                                </div>
                            </div>
                            <p class="text-[10px] text-pink-500 font-black mt-1 uppercase tracking-widest">${item.itemID}</p>
                        </div>
                    </div>
                    ${item.isOut ? `<div class="mt-4 p-3 bg-black/40 rounded-xl flex justify-between items-center text-[11px] border border-white/5">
                        <span class="text-pink-400 font-black uppercase">👤 ${item.dancer}</span>
                        <span class="${isOverdue ? 'text-red-500 animate-pulse font-bold' : 'text-gray-400'}">📅 ${item.outDate}</span>
                    </div>` : ''}
                </div>`;
            }).reverse().join('');
        }

        // --- განახლებული წაშლის ფუნქცია ---
        function deleteItem(id) {
            if (!id) {
                alert("შეცდომა: მონაცემი ვერ მოიძებნა.");
                return;
            }
            if(confirm('ნამდვილად გსურთ წაშლა?')) {
                // პირდაპირი წვდომა Firebase ID-ზე
                db.ref('inventory/' + id).remove()
                .then(() => { console.log("Deleted:", id); })
                .catch(err => { 
                    console.error("Delete error:", err);
                    alert("ვერ წაიშალა. შეამოწმეთ Firebase Rules.");
                });
            }
        }

        function editItem(id) {
            const i = allData.find(x => x.id === id);
            if(!i) return;
            document.getElementById('edit-id').value = i.id;
            document.getElementById('itemID').value = i.itemID || "";
            document.getElementById('name').value = i.name || "";
            document.getElementById('color').value = i.color || "";
            document.getElementById('category').value = i.category || "";
            document.getElementById('gender').value = i.gender || "ბიჭი";
            document.getElementById('firstUse').value = i.firstUse || "";
            document.getElementById('firstUseInfo').textContent = "გადაეცა: " + (i.firstUse || "---");
            document.getElementById('isOut').checked = i.isOut || false;
            document.getElementById('dancer').value = i.dancer || "";
            document.getElementById('outDate').value = i.outDate || "";
            if(i.photo) {
                document.getElementById('imgPreview').src = i.photo;
                document.getElementById('imgPreview').classList.remove('hidden');
                document.getElementById('photoIcon').classList.add('hidden');
            }
            toggleOutFields();
            document.getElementById('modal-title').textContent = "რედაქტირება";
            document.getElementById('modal').classList.remove('hidden');
        }

        function openModal() {
            document.getElementById('inventoryForm').reset();
            document.getElementById('edit-id').value = "";
            document.getElementById('firstUseInfo').textContent = "";
            document.getElementById('imgPreview').classList.add('hidden');
            document.getElementById('photoIcon').classList.remove('hidden');
            document.getElementById('modal-title').textContent = "რეგისტრაცია";
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function toggleOutFields() { document.getElementById('assignFields').classList.toggle('hidden', !document.getElementById('isOut').checked); }
        function changeSection(s) {
            currentSection = s;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            document.getElementById('tab-'+s).classList.add('tab-active');
            handleSearch();
        }
        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    document.getElementById('imgPreview').src = e.target.result;
                    document.getElementById('imgPreview').classList.remove('hidden');
                    document.getElementById('photoIcon').classList.add('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
