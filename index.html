<!doctype html>
<html lang="ka" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EGRISI - მართვის სისტემა</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans Georgian', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #020617; color: #f8fafc; margin: 0; padding-bottom: 100px; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-active { border-bottom: 3px solid #00a2ff; color: #00a2ff; font-weight: 700; }
        .input-field { background: #1e293b; border: 1px solid #334155; border-radius: 14px; padding: 12px; color: white; width: 100%; outline: none; height: 52px; transition: 0.3s; }
        .input-field:focus { border-color: #00a2ff; box-shadow: 0 0 10px rgba(0, 162, 255, 0.2); }
        .btn-action { height: 52px; border-radius: 14px; font-weight: 800; transition: 0.2s; display: flex; items-center; justify-center; gap: 8px; }
        .btn-action:active { transform: scale(0.96); }
        .copy-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #00a2ff; color: white; padding: 10px 20px; border-radius: 25px; font-size: 13px; font-weight: bold; z-index: 1000; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div id="copyToast" class="copy-toast">დაკოპირდა! ✅</div>

    <div id="login-screen" class="fixed inset-0 z-[100] bg-[#020617] flex items-center justify-center p-6">
        <div class="glass p-8 rounded-[2.5rem] w-full max-w-sm text-center shadow-2xl">
            <div class="w-32 h-32 mx-auto mb-6 bg-white/5 rounded-full p-4 flex items-center justify-center">
                <img src="https://i.ibb.co/3mN9hGqX/image.png" onerror="this.src='https://egrisi.ge/wp-content/uploads/2021/05/logo-white.png'" class="max-w-full max-h-full object-contain" alt="Egrisi">
            </div>
            
            <h2 class="text-white/40 text-[10px] uppercase tracking-[0.4em] mb-8">Secure Access</h2>
            
            <input type="password" id="pass-input" placeholder="••••••••" class="input-field text-center mb-4 tracking-widest">
            
            <div class="flex gap-2">
                <button onclick="checkPass()" class="flex-1 btn-action bg-sky-600 text-white">შესვლა</button>
                <button id="bio-auth-btn" onclick="tryBiometric()" class="w-14 btn-action bg-white/10 text-sky-400 hidden">
                    <span class="text-xl">🆔</span>
                </button>
            </div>
            
            <p id="bio-status" class="text-[10px] text-gray-500 mt-4 italic"></p>
        </div>
    </div>

    <div id="app-content" class="hidden animate-in fade-in duration-500">
        <header class="p-6 flex flex-col items-center">
            <img src="https://i.ibb.co/3mN9hGqX/image.png" onerror="this.src='https://egrisi.ge/wp-content/uploads/2021/05/logo-white.png'" class="w-20 drop-shadow-2xl">
            <div class="mt-4 flex gap-4 text-[10px] font-bold text-white/30 tracking-widest uppercase">
                <span>Egrisi</span>
                <span>•</span>
                <span>Inventory</span>
                <span>•</span>
                <span>2026</span>
            </div>
        </header>

        <div class="max-w-2xl mx-auto px-4 grid grid-cols-3 gap-3">
            <div onclick="filterByStat('all')" class="glass p-4 rounded-2xl text-center active:scale-95 transition-transform">
                <p class="text-[9px] text-gray-500 uppercase font-black">ჯამი</p>
                <p id="stat-total" class="text-2xl font-black">0</p>
            </div>
            <div onclick="filterByStat('out')" class="glass p-4 rounded-2xl text-center border-b-4 border-sky-500 active:scale-95 transition-transform">
                <p class="text-[9px] text-sky-500 uppercase font-black">გაცემული</p>
                <p id="stat-out" class="text-2xl font-black">0</p>
            </div>
            <div onclick="filterByStat('in')" class="glass p-4 rounded-2xl text-center border-b-4 border-green-500 active:scale-95 transition-transform">
                <p class="text-[9px] text-green-500 uppercase font-black">რეზერვი</p>
                <p id="stat-in" class="text-2xl font-black">0</p>
            </div>
        </div>

        <nav class="sticky top-0 z-50 glass flex justify-around p-4 my-6 mx-4 rounded-2xl">
            <button onclick="changeSection('all')" id="tab-all" class="text-[11px] uppercase tracking-tighter tab-active">ყველა</button>
            <button onclick="changeSection('ბიჭი')" id="tab-ბიჭი" class="text-[11px] uppercase tracking-tighter">ვაჟი</button>
            <button onclick="changeSection('გოგო')" id="tab-გოგო" class="text-[11px] uppercase tracking-tighter">გოგონა</button>
            <button onclick="changeSection('reserve')" id="tab-reserve" class="text-[11px] uppercase tracking-tighter">📦 რეზერვი</button>
        </nav>

        <div class="max-w-2xl mx-auto px-4">
            <div class="relative mb-6">
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="ძიება..." class="input-field pl-12 glass border-none">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 opacity-30">🔍</span>
            </div>
            
            <div class="flex gap-3 mb-8">
                <button onclick="exportToPDF()" class="flex-1 btn-action bg-slate-800 text-xs uppercase tracking-widest text-gray-400">📄 PDF რეპორტი</button>
                <button onclick="openModal()" class="w-20 btn-action bg-sky-600 text-3xl shadow-[0_0_20px_rgba(2,132,199,0.4)]">+</button>
            </div>

            <div id="pdf-content" class="space-y-4">
                <div id="main-container" class="space-y-4 pb-20"></div>
            </div>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-[150] flex items-end sm:items-center justify-center">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-xl" onclick="closeModal()"></div>
        <div class="relative glass w-full max-w-xl rounded-t-[3rem] sm:rounded-[3rem] p-8 overflow-y-auto max-h-[92vh] border-t-2 border-white/10">
            <div class="w-12 h-1.5 bg-white/10 rounded-full mx-auto mb-8 sm:hidden"></div>
            <h2 id="modal-title" class="text-2xl font-black text-sky-400 uppercase tracking-tighter mb-8">ნივთის რეგისტრაცია</h2>
            
            <form id="inventoryForm" onsubmit="saveData(event)" class="space-y-5">
                <input type="hidden" id="edit-id">
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-500 font-black uppercase ml-1">ინვენტარის ID</label>
                        <input type="text" id="itemID" placeholder="EGR-0000" class="input-field">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-500 font-black uppercase ml-1">სურათი</label>
                        <label class="btn-action bg-white/5 border border-white/10 cursor-pointer overflow-hidden">
                            <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="previewImage(this)">
                            <span id="photoIcon">📸 ფოტოს ატვირთვა</span>
                            <img id="imgPreview" class="absolute inset-0 w-full h-full object-cover hidden">
                        </label>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-[10px] text-gray-500 font-black uppercase ml-1">დასახელება</label>
                    <div class="flex gap-2">
                        <select id="name" class="input-field flex-1"></select>
                        <button type="button" onclick="manageList('names')" class="w-14 btn-action bg-sky-500/10 text-sky-500 text-xl">+</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-500 font-black uppercase ml-1">კატეგორია</label>
                        <div class="flex gap-2">
                            <select id="category" class="input-field flex-1"></select>
                            <button type="button" onclick="manageList('categories')" class="w-12 btn-action bg-sky-500/10 text-sky-500">+</button>
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-500 font-black uppercase ml-1">ფერი</label>
                        <div class="flex gap-2">
                            <select id="color" class="input-field flex-1"></select>
                            <button type="button" onclick="manageList('colors')" class="w-12 btn-action bg-sky-500/10 text-sky-500">+</button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-500 font-black uppercase ml-1">თარიღი</label>
                        <input type="date" id="firstUse" class="input-field">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] text-gray-500 font-black uppercase ml-1">სქესი</label>
                        <select id="gender" class="input-field">
                            <option value="ბიჭი">ვაჟი</option>
                            <option value="გოგო">გოგონა</option>
                        </select>
                    </div>
                </div>

                <div class="p-6 rounded-[2rem] bg-sky-500/5 border border-sky-500/10 mt-4">
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-black text-sky-400 uppercase italic tracking-widest">მოცეკვავეზე გაცემა</span>
                        <input type="checkbox" id="isOut" onchange="toggleOutFields()" class="w-7 h-7 rounded-full accent-sky-500">
                    </div>
                    <div id="assignFields" class="hidden space-y-4 mt-6">
                        <div class="flex gap-2">
                            <select id="dancer" class="input-field flex-1"></select>
                            <button type="button" onclick="manageList('dancers')" class="w-14 btn-action bg-sky-500/10 text-sky-500">+</button>
                        </div>
                        <input type="date" id="outDate" class="input-field">
                    </div>
                </div>

                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 btn-action bg-slate-800 text-xs uppercase">გაუქმება</button>
                    <button type="submit" id="saveBtn" class="flex-[2] btn-action bg-sky-600 text-xs uppercase tracking-[0.2em]">შენახვა</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const IMGBB_API_KEY = "08732fe472ef601b50c22d7b426a07e0";
        const firebaseConfig = {
            apiKey: "AIzaSyBSzgEbtRnLgiYrbCFhgb1fX9_f4cDLWgI",
            authDomain: "egrisi-79625.firebaseapp.com",
            databaseURL: "https://egrisi-79625-default-rtdb.firebaseio.com",
            projectId: "egrisi-79625"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let allData = [];
        let currentSection = 'all';
        const geoMap = {"a":"ა","b":"ბ","c":"ც","d":"დ","e":"ე","f":"ფ","g":"გ","h":"ჰ","i":"ი","j":"ჯ","k":"კ","l":"ლ","m":"მ","n":"ნ","o":"ო","p":"პ","q":"ქ","r":"რ","s":"ს","t":"ტ","u":"უ","v":"ვ","w":"წ","x":"ხ","y":"ყ","z":"ზ","R":"ღ","S":"შ","T":"თ","W":"ჭ","Z":"ძ","C":"ჩ"};

        // --- BIOMETRIC AUTH LOGIC ---
        async function checkBiometricSupport() {
            const btn = document.getElementById('bio-auth-btn');
            const status = document.getElementById('bio-status');
            
            if (window.PublicKeyCredential && localStorage.getItem('bio_registered') === 'true') {
                btn.classList.remove('hidden');
                status.textContent = "ბიომეტრია აქტიურია";
            }
        }

        async function tryBiometric() {
            // სიმულაცია ვებ-გარემოსთვის (ვინაიდან WebAuthn საჭიროებს HTTPS და დომენს)
            // რეალურ მობილურ აპლიკაციაში აქ გამოიძახება მოწყობილობის სკანერი
            if(confirm("გსურთ ბიომეტრიული ავტორიზაციით (FaceID/Fingerprint) შესვლა?")) {
                loginSuccess();
            }
        }

        function loginSuccess() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            
            // შესთავაზე ბიომეტრიის გააქტიურება პირველად
            if (localStorage.getItem('bio_registered') !== 'true') {
                setTimeout(() => {
                    if(confirm("გსურთ შემდეგში თითის ანაბეჭდით ან სახის ამოცნობით შემოხვიდეთ?")) {
                        localStorage.setItem('bio_registered', 'true');
                        checkBiometricSupport();
                    }
                }, 1000);
            }
        }

        function checkPass() {
            if(document.getElementById('pass-input').value === 'Egrisi_2026') { 
                loginSuccess();
            } else {
                alert("პაროლი არასწორია!");
            }
        }

        // --- CORE FUNCTIONS ---
        db.ref('inventory').on('value', snap => {
            const val = snap.val();
            allData = val ? Object.keys(val).map(id => ({id, ...val[id]})) : [];
            updateStats();
            renderUI();
        });

        function updateStats() {
            const outCount = allData.filter(i => i.isOut).length;
            document.getElementById('stat-total').textContent = allData.length;
            document.getElementById('stat-out').textContent = outCount;
            document.getElementById('stat-in').textContent = allData.length - outCount;
        }

        function renderUI(dataToUse = null) {
            const container = document.getElementById('main-container');
            let data = dataToUse || allData;

            if(!dataToUse) {
                if(currentSection === 'reserve') data = allData.filter(i => !i.isOut);
                else if(currentSection !== 'all') data = allData.filter(i => i.gender === currentSection);
            }

            container.innerHTML = data.map(item => `
                <div class="glass p-5 rounded-[2.5rem] border-l-8 ${item.gender === 'ბიჭი' ? 'border-sky-500' : 'border-pink-500'} shadow-xl">
                    <div class="flex gap-5">
                        <div class="w-24 h-24 rounded-3xl bg-white/5 overflow-hidden flex-shrink-0 border border-white/10">
                            ${item.photo ? `<img src="${item.photo}" class="w-full h-full object-cover">` : '<div class="flex h-full items-center justify-center text-3xl opacity-20 italic font-black">E</div>'}
                        </div>
                        <div class="flex-1 min-w-0 flex flex-col justify-center">
                            <div class="flex justify-between items-start mb-1">
                                <h3 class="font-black truncate text-lg tracking-tight">${item.name || '---'}</h3>
                                <div class="flex gap-3 ml-2">
                                    <button onclick="editItem('${item.id}')" class="text-xl opacity-40 hover:opacity-100">✏️</button>
                                    <button onclick="deleteItem('${item.id}')" class="text-xl text-red-500/40 hover:text-red-500">🗑️</button>
                                </div>
                            </div>
                            <p class="text-[12px] text-sky-400 font-black uppercase tracking-widest">${item.itemID}</p>
                            <div class="flex items-center gap-2 mt-2">
                                <span class="text-[10px] bg-white/5 px-3 py-1 rounded-full text-gray-400 uppercase font-bold">${item.category || 'ზოგადი'}</span>
                                ${item.color ? `<span class="text-[10px] text-gray-500 font-bold">• ${item.color}</span>` : ''}
                            </div>
                            ${item.firstUse ? `<p class="text-[10px] text-sky-500/50 mt-2 font-bold italic">📅 მიღებულია: ${item.firstUse}</p>` : ''}
                        </div>
                    </div>
                    ${item.isOut ? `
                    <div onclick="copyToClipboard('${item.dancer}')" class="mt-5 p-4 bg-sky-500/10 rounded-2xl flex justify-between items-center cursor-copy active:bg-sky-500/20 transition-all border border-sky-500/20">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-sky-500 rounded-full flex items-center justify-center text-[10px] font-bold">👤</div>
                            <span class="text-sm font-black text-sky-400">${item.dancer}</span>
                        </div>
                        <span class="text-[10px] text-gray-500 font-black tracking-tighter">${item.outDate || ''}</span>
                    </div>` : `
                    <div class="mt-4 pt-4 border-t border-white/5 text-center">
                        <span class="text-[10px] text-green-500/50 font-black uppercase tracking-[0.3em]">📦 რეზერვშია</span>
                    </div>`}
                </div>
            `).reverse().join('');
        }

        // Initialize lists and Bio
        window.onload = checkBiometricSupport;

        async function manageList(key) {
            const action = prompt(`დაამატეთ ახალი ან წაშალეთ (წასაშლელად სახელს ბოლოში მიუწერეთ !) :`);
            if(!action) return;
            db.ref('lists/' + key).once('value', snap => {
                let list = snap.val() || [];
                if(action.endsWith('!')) {
                    const toDel = action.slice(0, -1).trim();
                    list = list.filter(i => i !== toDel);
                } else if(!list.includes(action.trim())) {
                    list.push(action.trim());
                }
                db.ref('lists/' + key).set(list);
            });
        }

        db.ref('lists').on('value', snap => {
            const l = snap.val() || {};
            const fill = (id, list) => { const el = document.getElementById(id); if(el) el.innerHTML = '<option value="">-- აირჩიეთ --</option>' + (list ? list.sort().map(v => `<option value="${v}">${v}</option>`).join('') : ''); };
            fill('name', l.names); fill('category', l.categories); fill('color', l.colors); fill('dancer', l.dancers);
        });

        // Helper functions
        function copyToClipboard(t) { navigator.clipboard.writeText(t); const toast = document.getElementById('copyToast'); toast.style.display = 'block'; setTimeout(() => toast.style.display='none', 2000); }
        function openModal() { document.getElementById('inventoryForm').reset(); document.getElementById('edit-id').value = ""; document.getElementById('imgPreview').classList.add('hidden'); document.getElementById('photoIcon').classList.remove('hidden'); document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function toggleOutFields() { document.getElementById('assignFields').classList.toggle('hidden', !document.getElementById('isOut').checked); }
        function previewImage(input) { if (input.files && input.files[0]) { const r = new FileReader(); r.onload = e => { document.getElementById('imgPreview').src = e.target.result; document.getElementById('imgPreview').classList.remove('hidden'); document.getElementById('photoIcon').classList.add('hidden'); }; r.readAsDataURL(input.files[0]); } }
        function changeSection(s) { currentSection = s; document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active')); document.getElementById('tab-'+s).classList.add('tab-active'); renderUI(); }
        function deleteItem(id) { if(confirm('დარწმუნებული ხართ წაშლაში?')) db.ref('inventory/' + id).remove(); }
        
        async function saveData(e) {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.textContent = "...";
            const id = document.getElementById('edit-id').value;
            let photoUrl = id ? (allData.find(x => x.id === id)?.photo || "") : "";
            const file = document.getElementById('photoInput').files[0];

            if(file) {
                const fd = new FormData(); fd.append("image", file);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: fd });
                const json = await res.json();
                photoUrl = json.data.url;
            }

            const data = {
                itemID: document.getElementById('itemID').value || "EGR-TEMP",
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                color: document.getElementById('color').value,
                gender: document.getElementById('gender').value,
                firstUse: document.getElementById('firstUse').value,
                isOut: document.getElementById('isOut').checked,
                dancer: document.getElementById('dancer').value,
                outDate: document.getElementById('outDate').value,
                photo: photoUrl
            };
            if(id) await db.ref('inventory/' + id).set(data);
            else await db.ref('inventory').push(data);
            closeModal();
            btn.disabled = false; btn.textContent = "შენახვა";
        }

        function editItem(id) {
            const i = allData.find(x => x.id === id);
            document.getElementById('edit-id').value = id;
            document.getElementById('itemID').value = i.itemID || "";
            document.getElementById('name').value = i.name;
            document.getElementById('category').value = i.category;
            document.getElementById('color').value = i.color;
            document.getElementById('gender').value = i.gender;
            document.getElementById('firstUse').value = i.firstUse;
            document.getElementById('isOut').checked = i.isOut;
            document.getElementById('dancer').value = i.dancer;
            document.getElementById('outDate').value = i.outDate;
            if(i.photo) { document.getElementById('imgPreview').src = i.photo; document.getElementById('imgPreview').classList.remove('hidden'); document.getElementById('photoIcon').classList.add('hidden'); }
            toggleOutFields();
            document.getElementById('modal').classList.remove('hidden');
        }

        function handleSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const f = allData.filter(i => (i.name||'').toLowerCase().includes(q) || (i.itemID||'').toLowerCase().includes(q) || (i.dancer||'').toLowerCase().includes(q));
            renderUI(f);
        }

        function exportToPDF() {
            const element = document.getElementById('pdf-content');
            html2pdf().set({ margin: 10, filename: 'Egrisi_Inventory.pdf', html2canvas: { scale: 2, useCORS: true }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } }).from(element).save();
        }
    </script>
</body>
</html>
