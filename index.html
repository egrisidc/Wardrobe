<!doctype html>
<html lang="ka" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ეგრისი - გარდერობი</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans Georgian', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #1a1a2e; color: white; margin: 0; }
        .item-card { transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.1); }
        .tab-btn.active { color: #e94560; border-bottom: 3px solid #e94560; opacity: 1; }
    </style>
</head>
<body class="h-full overflow-x-hidden">
    <div id="app" class="min-h-full pb-10">
        <header class="sticky top-0 z-40 backdrop-blur-lg bg-[#1a1a2e]/80 border-b border-white/10 p-4">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-pink-500 to-red-500 rounded-lg flex items-center justify-center">🎭</div>
                    <div>
                        <h1 class="text-lg font-bold">ეგრისი</h1>
                        <p class="text-[10px] text-gray-400 uppercase tracking-widest">ანსამბლი</p>
                    </div>
                </div>
                <button onclick="openModal()" class="bg-pink-600 p-2 rounded-full shadow-lg active:scale-90 transition-transform">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                </button>
            </div>
        </header>

        <div class="max-w-6xl mx-auto px-4 py-6 grid grid-cols-2 gap-4">
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-center">
                <div class="text-3xl font-bold" id="stat-total">0</div>
                <div class="text-xs text-gray-400">ნივთი</div>
            </div>
            <div class="bg-white/5 p-4 rounded-2xl border border-white/5 text-center">
                <div class="text-3xl font-bold text-red-500" id="stat-overdue">0</div>
                <div class="text-xs text-gray-400">ვადაგადაცილებული</div>
            </div>
        </div>
        <main class="max-w-6xl mx-auto px-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="items-container"></main>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="relative bg-[#1a1a2e] w-full max-w-md rounded-3xl p-6 border border-white/10 shadow-2xl">
            <form id="item-form" onsubmit="handleSubmit(event)" class="space-y-4">
                <h2 id="modal-title" class="text-xl font-bold text-pink-500">დამატება</h2>
                <input type="text" id="input-name" placeholder="ნივთის სახელი" required class="w-full p-3 rounded-xl bg-white/5 border border-white/10 text-white outline-none">
                <div class="grid grid-cols-2 gap-3">
                    <select id="input-gender" class="p-3 rounded-xl bg-white/5 border border-white/10 text-white outline-none">
                        <option value="boys">ბიჭი</option>
                        <option value="girls">გოგონა</option>
                    </select>
                    <select id="input-condition" class="p-3 rounded-xl bg-white/5 border border-white/10 text-white outline-none">
                        <option value="ახალი">ახალი</option>
                        <option value="კარგი">კარგი</option>
                    </select>
                </div>
                <div class="flex items-center justify-between p-3 bg-white/5 rounded-xl">
                    <span class="text-sm">გაცემულია?</span>
                    <input type="checkbox" id="input-checked-out" onchange="toggleCheckoutFields()" class="w-5 h-5 accent-pink-500">
                </div>
                <div id="checkout-fields" class="hidden space-y-3">
                    <input type="text" id="input-person" placeholder="ვისზე?" class="w-full p-3 rounded-xl bg-white/5 border border-white/10 text-white">
                    <input type="date" id="input-due-date" class="w-full p-3 rounded-xl bg-white/5 border border-white/10 text-white">
                </div>
                <div class="flex gap-2 pt-4">
                    <button type="button" onclick="closeModal()" class="flex-1 p-4 rounded-2xl bg-gray-800">გაუქმება</button>
                    <button type="submit" class="flex-[2] p-4 rounded-2xl bg-pink-600 font-bold">შენახვა</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBSzgEbtRnLgiYrbCFhgb1fX9_f4cDLWgI",
            authDomain: "egrisi-79625.firebaseapp.com",
            databaseURL: "https://egrisi-79625-default-rtdb.firebaseio.com",
            projectId: "egrisi-79625",
            storageBucket: "egrisi-79625.firebasestorage.app",
            messagingSenderId: "110533682613",
            appId: "1:110533682613:web:3ac71dab90e5972cf265fc"
        };

        try {
            firebase.initializeApp(firebaseConfig);
            const db = firebase.database();
            console.log("Firebase initialized successfully");

            let allItems = [];

            db.ref('inventory').on('value', (snapshot) => {
                const data = snapshot.val();
                allItems = data ? Object.keys(data).map(key => ({ id: key, ...data[key] })) : [];
                renderItems();
                updateStats();
            }, (error) => {
                alert("ბაზასთან კავშირის შეცდომა: " + error.message);
            });

            function renderItems() {
                const container = document.getElementById('items-container');
                container.innerHTML = allItems.map(item => `
                    <div class="item-card p-5 rounded-3xl bg-white/5">
                        <h3 class="font-bold text-lg">${item.name}</h3>
                        <p class="text-xs text-gray-400">${item.gender === 'boys' ? 'ბიჭი' : 'გოგონა'}</p>
                        <div class="mt-3 pt-3 border-t border-white/5 text-sm">
                            ${item.isCheckedOut ? `👤 ${item.person} | 📅 ${item.dueDate}` : '✓ გარდერობშია'}
                        </div>
                    </div>
                `).join('');
            }

            function updateStats() {
                document.getElementById('stat-total').textContent = allItems.length;
            }

            window.openModal = function() {
                document.getElementById('modal').classList.remove('hidden');
            };

            window.closeModal = function() {
                document.getElementById('modal').classList.add('hidden');
            };

            window.toggleCheckoutFields = function() {
                const isChecked = document.getElementById('input-checked-out').checked;
                document.getElementById('checkout-fields').classList.toggle('hidden', !isChecked);
            };

            window.handleSubmit = async function(e) {
                e.preventDefault();
                const data = {
                    name: document.getElementById('input-name').value,
                    gender: document.getElementById('input-gender').value,
                    condition: document.getElementById('input-condition').value,
                    isCheckedOut: document.getElementById('input-checked-out').checked,
                    person: document.getElementById('input-person').value || '',
                    dueDate: document.getElementById('input-due-date').value || ''
                };
                try {
                    await db.ref('inventory').push(data);
                    closeModal();
                    document.getElementById('item-form').reset();
                } catch (err) {
                    alert("შენახვის შეცდომა: " + err.message);
                }
            };

        } catch (e) {
            alert("კრიტიკული შეცდომა: " + e.message);
        }
    </script>
</body>
</html>
