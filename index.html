<!doctype html>
<html lang="ka" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ეგრისი - პროფესიონალური გარდერობი</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Noto Sans Georgian', sans-serif; }
        body { background: #0f172a; color: #f8fafc; margin: 0; padding-bottom: 80px; }
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-active { border-bottom: 4px solid #ec4899; color: #ec4899; font-weight: 700; }
        .input-field { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 12px; color: white; width: 100%; outline: none; }
        .input-field:focus { border-color: #ec4899; }
    </style>
</head>
<body class="h-full overflow-x-hidden">

    <nav class="sticky top-0 z-50 glass flex justify-around p-4 mb-6">
        <button onclick="changeSection('all')" id="tab-all" class="pb-2 text-sm tab-active">ყველა</button>
        <button onclick="changeSection('ბიჭი')" id="tab-boys" class="pb-2 text-sm">ბიჭი</button>
        <button onclick="changeSection('გოგო')" id="tab-girls" class="pb-2 text-sm">გოგონა</button>
    </nav>

    <div class="max-w-4xl mx-auto px-4">
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="glass p-6 rounded-3xl">
                <span class="text-xs text-gray-400 block mb-1">სულ ინვენტარი</span>
                <span id="total-count" class="text-3xl font-bold">0</span>
            </div>
            <button onclick="openModal()" class="bg-gradient-to-br from-pink-600 to-violet-600 rounded-3xl p-6 flex items-center justify-center font-bold text-lg shadow-lg active:scale-95 transition-transform">
                + დამატება
            </button>
        </div>

        <div id="main-container" class="space-y-4">
            </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="relative glass w-full max-w-xl rounded-[2.5rem] p-8 overflow-y-auto max-h-[90vh]">
            <h2 class="text-2xl font-bold mb-6 text-pink-500">ნივთის რეგისტრაცია</h2>
            
            <form id="inventoryForm" onsubmit="saveData(event)" class="space-y-4 text-sm">
                <div>
                    <label class="block mb-1 text-gray-400">ნივთის დასახელება</label>
                    <input type="text" id="name" required class="input-field" placeholder="მაგ: აჭარული ჩოხა">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-1 text-gray-400">სქესი</label>
                        <select id="gender" class="input-field">
                            <option value="ბიჭი">ბიჭი</option>
                            <option value="გოგო">გოგო</option>
                            <option value="საერთო">საერთო</option>
                        </select>
                    </div>
                    <div>
                        <label class="block mb-1 text-gray-400">ფერი</label>
                        <input type="text" id="color" class="input-field" placeholder="მაგ: შინდისფერი">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block mb-1 text-gray-400">პირველი ხმარების თარიღი</label>
                        <input type="date" id="firstUse" class="input-field">
                    </div>
                    <div>
                        <label class="block mb-1 text-gray-400">კატეგორია</label>
                        <input type="text" id="category" class="input-field" placeholder="მაგ: კოსტუმი">
                    </div>
                </div>

                <div class="p-5 rounded-2xl bg-white/5 border border-white/10 mt-4">
                    <div class="flex items-center justify-between mb-4">
                        <span class="font-bold">გაცემის სტატუსი</span>
                        <input type="checkbox" id="isOut" onchange="document.getElementById('assignFields').classList.toggle('hidden')" class="w-6 h-6 accent-pink-500">
                    </div>
                    <div id="assignFields" class="hidden space-y-3">
                        <input type="text" id="dancer" placeholder="მოცეკვავის სახელი" class="input-field">
                        <label class="text-[10px] text-gray-500 uppercase">გაცემის თარიღი</label>
                        <input type="date" id="outDate" class="input-field">
                    </div>
                </div>

                <div class="flex gap-3 pt-6">
                    <button type="button" onclick="closeModal()" class="flex-1 p-4 rounded-2xl bg-slate-800 font-bold">გაუქმება</button>
                    <button type="submit" class="flex-[2] p-4 rounded-2xl bg-pink-600 font-bold">მონაცემის შენახვა</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBSzgEbtRnLgiYrbCFhgb1fX9_f4cDLWgI",
            authDomain: "egrisi-79625.firebaseapp.com",
            databaseURL: "https://egrisi-79625-default-rtdb.firebaseio.com",
            projectId: "egrisi-79625"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentSection = 'all';
        let allData = [];

        // Realtime Listener
        db.ref('inventory').on('value', (snap) => {
            const data = snap.val();
            allData = data ? Object.keys(data).map(id => ({id, ...data[id]})) : [];
            renderUI();
        });

        function renderUI() {
            const container = document.getElementById('main-container');
            let filtered = allData;
            if (currentSection !== 'all') {
                filtered = allData.filter(i => i.gender === currentSection || i.gender === 'საერთო');
            }

            document.getElementById('total-count').textContent = filtered.length;

            container.innerHTML = filtered.map(item => `
                <div class="glass p-5 rounded-[2rem] relative group border-l-8 ${item.gender === 'ბიჭი' ? 'border-blue-500' : 'border-pink-500'}">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="text-xl font-bold">${item.name}</h3>
                            <div class="flex gap-2 mt-2">
                                <span class="text-[10px] px-2 py-1 bg-white/5 rounded-lg text-gray-300">🎨 ${item.color}</span>
                                <span class="text-[10px] px-2 py-1 bg-white/5 rounded-lg text-gray-300">📦 ${item.category}</span>
                            </div>
                        </div>
                        <button onclick="deleteItem('${item.id}')" class="text-red-500 p-2 text-xs font-bold">წაშლა</button>
                    </div>

                    <div class="mt-4 grid grid-cols-2 gap-4 text-[10px] text-gray-400">
                        <div>🕒 ხმარებაშია: <span class="text-white">${item.firstUse || 'არ არის მითითებული'}</span></div>
                        ${item.isOut ? `<div class="text-orange-400 italic">📅 გაცემულია: ${item.outDate}</div>` : '<div class="text-green-500">✓ საწყობშია</div>'}
                    </div>

                    ${item.isOut ? `
                    <div class="mt-3 p-3 bg-white/5 rounded-xl flex items-center justify-between border border-white/5">
                        <span class="text-sm font-semibold text-pink-400 font-medium tracking-wide">👤 ${item.dancer}</span>
                        <button onclick="returnItem('${item.id}')" class="text-[10px] bg-emerald-500 text-white px-3 py-1 rounded-full uppercase font-bold">დაბრუნება</button>
                    </div>` : ''}
                </div>
            `).join('');
        }

        async function saveData(e) {
            e.preventDefault();
            const payload = {
                name: document.getElementById('name').value,
                gender: document.getElementById('gender').value,
                color: document.getElementById('color').value,
                category: document.getElementById('category').value,
                firstUse: document.getElementById('firstUse').value,
                isOut: document.getElementById('isOut').checked,
                dancer: document.getElementById('dancer').value,
                outDate: document.getElementById('outDate').value
            };
            await db.ref('inventory').push(payload);
            closeModal();
            e.target.reset();
        }

        async function returnItem(id) {
            if(confirm('ნივთი დაბრუნდა საწყობში?')) {
                await db.ref('inventory/'+id).update({ isOut: false, dancer: '', outDate: '' });
            }
        }

        function deleteItem(id) { if(confirm('წავშალოთ ნივთი ბაზიდან?')) db.ref('inventory/'+id).remove(); }

        function changeSection(s) {
            currentSection = s;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            if(s === 'all') document.getElementById('tab-all').classList.add('tab-active');
            if(s === 'ბიჭი') document.getElementById('tab-boys').classList.add('tab-active');
            if(s === 'გოგო') document.getElementById('tab-girls').classList.add('tab-active');
            renderUI();
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
    </script>
</body>
</html>
